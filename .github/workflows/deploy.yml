name: Build & Deploy Auth Service

on:
  push:
    branches:
      - main
      - master

jobs:
  notify-monorepo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auth repo
        uses: actions/checkout@v4

      - name: Trigger monorepo build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MONOREPO_TOKEN }}" \
            https://api.github.com/repos/temenb/game/dispatches \
            -d '{"event_type":"service-updated","client_payload":{"service":"auth"}}'
