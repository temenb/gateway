name: Build & Deploy Auth Service

on:
  push:
    branches:
      - prod

jobs:
  determine-version:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    outputs:
      version: ${{ steps.bump_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version from the latest git tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin 'refs/tags/*:refs/tags/*'
          TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          echo "TAG=$TAG"
          if [ -z "$TAG" ]; then
            TAG="0.0.0"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Bump patch version
        id: bump_version
        run: |
          # Split the version into its components
          IFS='.' read -r -a VERSION_PARTS <<< "$TAG"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          # Set default values if components are missing
          if [[ -z "$MAJOR" ]]; then
            MAJOR=0
          fi
          if [[ -z "$MINOR" ]]; then
            MINOR=0
          fi
          if [[ -z "$PATCH" ]]; then
            PATCH=0
          fi

          # Increment the version until a unique tag is found
          while git tag -l "$MAJOR.$MINOR.$PATCH" | grep -q .; do
            if [ "$GITHUB_REF_NAME" = "dev" ]; then
              PATCH=$((PATCH + 1))
            fi

            if [ "$GITHUB_REF_NAME" = "uat" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            fi

            if [ "$GITHUB_REF_NAME" = "prod" ]; then
              MAJOR=$((MAJOR + 1))
              PATCH=0
              MINOR=0
            fi
          done


          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated new version: $VERSION"

      - name: Create and push release tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${GITHUB_REPOSITORY}.git
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION


  notify-monorepo:
    runs-on: ubuntu-latest
    needs: determine-version
    steps:
      - name: Checkout auth repo
        uses: actions/checkout@v4

      - name: Trigger monorepo build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/temenb/game/dispatches \
            -d "{\"event_type\":\"service-updated\",\"client_payload\":{\"service\":\"${GITHUB_REPOSITORY}\",\"branch\":\"${GITHUB_REF_NAME}\",\"version\":\"${VERSION}\"}}"


